<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageBoard Ver1.1</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>ImageBoard Ver1.1</h1>

    <div class="toolbar">
        <input type="file" id="imageInput" multiple accept="image/*">

        <button id="addSlot">＋ 枠追加</button>
        <button id="removeSlot">－ 枠削除</button>
    </div>

    <h2>画像一覧</h2>
    <div id="imageList"></div>

    <hr>

    <h2>ボード</h2>
    <div class="board">

        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
